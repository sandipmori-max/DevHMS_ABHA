<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Keyboard List Navigation</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
    }

    .list-container {
      width: 300px;
      height: 400px;
      overflow-y: auto;
      border: 1px solid #ccc;
      border-radius: 10px;
      position: relative;
      outline: none;
    }

    .list-item {
      padding: 10px 14px;
      border-bottom: 1px solid #eee;
      transition: 0.2s;
    }

    .list-item.active {
      background: #007bff;
      color: white;
    }

    /* bottom fade indicator */
    .bottom-indicator {
      position: sticky;
      bottom: 0;
      height: 40px;
      background: linear-gradient(to top, rgba(0,0,0,0.25), transparent);
      pointer-events: none;
      display: none;
    }
  </style>
</head>
<body>

<h3>⬆️⬇️ Use Arrow Keys</h3>

<div id="list" class="list-container" tabindex="0">
  <!-- items will be injected -->
  <div id="bottomFade" class="bottom-indicator"></div>
</div>

<script>
  const list = document.getElementById("list");
  const bottomFade = document.getElementById("bottomFade");

  let selectedIndex = 0;
  const items = [];

  // ✅ Create 250 dummy items
  for (let i = 0; i < 250; i++) {
    const div = document.createElement("div");
    div.className = "list-item";
    div.innerText = "Item " + (i + 1);

    list.insertBefore(div, bottomFade);
    items.push(div);
  }

  // ✅ set active item
  function updateActive() {
    items.forEach((el, i) => {
      el.classList.toggle("active", i === selectedIndex);
    });

    items[selectedIndex].scrollIntoView({
      behavior: "smooth",
      block: "nearest"
    });
  }

  updateActive();

  // ✅ keyboard navigation
  list.addEventListener("keydown", (e) => {
    if (e.key === "ArrowDown") {
      selectedIndex = Math.min(selectedIndex + 1, items.length - 1);
      updateActive();
    }

    if (e.key === "ArrowUp") {
      selectedIndex = Math.max(selectedIndex - 1, 0);
      updateActive();
    }
  });

  // ✅ scroll indicator logic
  list.addEventListener("scroll", () => {
    const isAtBottom =
      list.scrollHeight - list.scrollTop === list.clientHeight;

    bottomFade.style.display = isAtBottom ? "none" : "block";
  });
</script>

</body>
</html>
